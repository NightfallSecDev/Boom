<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loom | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --bg-surface: #0a0a0a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.5);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.08) 0%, rgba(0,0,0,0) 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 3rem;
            padding: 0 1rem;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 8px;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .brand-text {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 0.875rem 1rem;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
            border: 1px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--bg-card);
            color: var(--text-main);
            border-color: var(--border-color);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: rgba(79, 70, 229, 0.1);
            border-color: rgba(79, 70, 229, 0.3);
            color: #818cf8;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 3rem 4rem;
            overflow-y: auto;
            position: relative;
        }

        header {
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-main);
            display: inline-block;
        }

        /* Cards */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .grid { display: grid; gap: 1.5rem; }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }

        /* Tables */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        td {
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            color: var(--text-main);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }

        tbody tr { transition: background 0.2s ease; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .badge-online { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-offline { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.2); }
        .badge-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }

        /* Forms */
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        input, select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        
        select option {
            background-color: var(--bg-surface);
            color: var(--text-main);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
        }

        /* Code blocks */
        pre {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem;
            margin: 0;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-area-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="brand">
            <div class="brand-icon"></div>
            <div class="brand-text">LOOM</div>
        </div>
        <div class="nav-links">
            <a href="{% url 'dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{% url 'clients_page' %}" class="nav-item {% if request.resolver_match.url_name == 'clients_page' %}active{% endif %}">Clients</a>
            <a href="{% url 'tasks_page' %}" class="nav-item {% if request.resolver_match.url_name == 'tasks_page' %}active{% endif %}">Deploy Tasks</a>
            <a href="{% url 'explorer_page' %}" style="display: block; padding: 0.75rem 1rem; margin-bottom: 0.5rem; text-decoration: none; color: #d1d5db; border-radius: 6px; transition: background 0.2s;">📂 Node Explorer</a>
            <a href="{% url 'vault_page' %}" style="display: block; padding: 0.75rem 1rem; margin-bottom: 0.5rem; text-decoration: none; color: #d1d5db; border-radius: 6px; transition: background 0.2s;">🗃️ File Vault</a>
            
            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
                <a href="{% url 'logout' %}" style="display: block; padding: 0.75rem 1rem; text-decoration: none; color: #ef4444; border-radius: 6px; transition: background 0.2s;">🚪 Disconnect (Logout)</a>
            </div>
            <a href="{% url 'logs_page' %}" class="nav-item {% if request.resolver_match.url_name == 'logs_page' %}active{% endif %}">Execution Logs</a>
        </div>
    </nav>
    <main class="main-content">
        <div class="content-area-fade-in">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>

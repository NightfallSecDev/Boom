<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loom | Restricted Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0f1115; color: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #1a1d24; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05); }
        .login-box h2 { margin-top: 0; color: #a5b4fc; text-align: center; margin-bottom: 2rem; font-weight: 600; letter-spacing: -0.5px;}
        .input-group { margin-bottom: 1.25rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .input-group input { width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box; transition: border-color 0.2s; }
        .input-group input:focus { outline: none; border-color: #6366f1; }
        .btn { width: 100%; padding: 0.75rem; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: background 0.2s; margin-top: 0.5rem; box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2); }
        .btn:hover { background: #4338ca; }
        .error { color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; text-align: center; background: rgba(239, 68, 68, 0.1); padding: 0.5rem; border-radius: 4px;}
        .shield-icon { text-align: center; font-size: 2.5rem; margin-bottom: 1rem; color: #4f46e5; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="shield-icon">🛡️</div>
        <h2>Loom Authentication</h2>
        {% if form.errors %}
            <div class="error">Invalid Operator ID or Passphrase.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <label>Operator ID</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="input-group">
                <label>Passphrase</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Establish Link</button>
        </form>
    </div>
</body>
</html>
